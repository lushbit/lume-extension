<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lume Redirect</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <h1>Lume Redirect</h1>
      <p class="hint">Default: <strong>https://lume-reader.vercel.app</strong></p>

      <label for="customBaseUrl">Custom Domain (optional)</label>
      <input id="customBaseUrl" type="url" placeholder="https://lume.yourdomain.com" />

      <label class="toggle-row" for="enabled">
        <input id="enabled" type="checkbox" />
        <span>Enable automatic article checks</span>
      </label>

      <div class="row">
        <button id="saveBtn" type="button">Save</button>
        <button id="optionsBtn" type="button" class="secondary">Options</button>
      </div>
      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
